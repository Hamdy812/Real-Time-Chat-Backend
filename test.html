<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Test</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f1f0eb; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .chat-wrap { display: flex; flex-direction: column; height: 580px; width: 420px; background: #fff; border: 0.5px solid #ddd; border-radius: 12px; overflow: hidden; }
    .top-bar { padding: 12px 16px; border-bottom: 0.5px solid #ddd; display: flex; align-items: center; gap: 10px; background: #f9f9f7; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; background: #E6F1FB; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; color: #185FA5; flex-shrink: 0; }
    .top-info { flex: 1; }
    .top-name { font-size: 14px; font-weight: 500; color: #1a1a1a; }
    .top-status { font-size: 12px; color: #888; display: flex; align-items: center; gap: 4px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
    .dot.online { background: #1D9E75; }
    .connect-btn { font-size: 12px; padding: 5px 12px; border-radius: 8px; border: 0.5px solid #ccc; background: transparent; color: #333; cursor: pointer; display: flex; align-items: center; gap: 5px; }
    .connect-btn:hover { background: #f1f0eb; }
    .connect-btn.connected { color: #0F6E56; border-color: #1D9E75; }
    .setup-bar { padding: 10px 16px; border-bottom: 0.5px solid #ddd; display: flex; gap: 8px; align-items: center; }
    .setup-bar input { flex: 1; font-size: 13px; padding: 6px 10px; border: 0.5px solid #ddd; border-radius: 8px; background: #f9f9f7; color: #1a1a1a; outline: none; }
    .join-btn { font-size: 12px; padding: 6px 12px; border-radius: 8px; border: 0.5px solid #ccc; background: transparent; color: #333; cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 5px; }
    .join-btn:hover { background: #f1f0eb; }
    .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .msg-row { display: flex; align-items: flex-end; gap: 8px; }
    .msg-row.sent { flex-direction: row-reverse; }
    .msg-bubble { max-width: 65%; padding: 8px 12px; border-radius: 16px; font-size: 14px; line-height: 1.5; color: #1a1a1a; background: #f1f0eb; border: 0.5px solid #ddd; }
    .msg-row.sent .msg-bubble { background: #E1F5EE; color: #04342C; border-color: transparent; }
    .msg-time { font-size: 11px; color: #aaa; margin-top: 2px; }
    .typing-indicator { display: none; align-items: center; gap: 6px; padding: 4px 20px 8px; }
    .typing-indicator.visible { display: flex; }
    .typing-dots { display: flex; gap: 3px; }
    .typing-dots span { width: 6px; height: 6px; border-radius: 50%; background: #aaa; animation: bounce 1.2s infinite; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)} }
    .input-bar { padding: 12px 16px; border-top: 0.5px solid #ddd; display: flex; gap: 8px; align-items: center; }
    .msg-input { flex: 1; font-size: 14px; padding: 8px 12px; border: 0.5px solid #ddd; border-radius: 20px; background: #f9f9f7; color: #1a1a1a; outline: none; }
    .msg-input:focus { border-color: #888; }
    .send-btn { width: 36px; height: 36px; border-radius: 50%; border: none; background: #1D9E75; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .send-btn:hover { background: #0F6E56; }
    .send-btn:disabled { background: #ddd; cursor: not-allowed; }
    .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: #aaa; font-size: 13px; }
  </style>
</head>
<body>

<div class="chat-wrap">
  <div class="top-bar">
    <div class="avatar" id="recv-avatar">?</div>
    <div class="top-info">
      <div class="top-name" id="recv-name">Connected</div>
      <div class="top-status">
        <div class="dot" id="status-dot"></div>
        <span id="status-text"> Disconnected</span>
      </div>
    </div>
    <button class="connect-btn" id="conn-btn" onclick="handleConnect()">
      <i class="ti ti-plug"></i> connection
    </button>
  </div>

  <div class="setup-bar">
    <input id="sender" placeholder="Sender ID" />
    <input id="receiver" placeholder="Receiver ID" />
    <button class="join-btn" onclick="joinRoom()">
      <i class="ti ti-door-enter"></i> Join
    </button>
  </div>

  <div class="messages" id="messages">
    <div class="empty-state" id="empty-state">
      <i class="ti ti-message-circle" style="font-size:32px"></i>
      <span>Start Connection And Enter Ids</span>
    </div>
  </div>

  <div class="typing-indicator" id="typing-indicator">
    <div class="typing-dots"><span></span><span></span><span></span></div>
    <span style="font-size:12px; color:#888">Typing...</span>
  </div>

  <div class="input-bar">
    <input class="msg-input" id="msg-input" placeholder="Send messages ..." onkeydown="handleKey(event)" oninput="handleTyping()" disabled />
    <button class="send-btn" id="send-btn" onclick="sendMsg()" disabled>
      <i class="ti ti-send"></i>
    </button>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
  let socket, joined = false, typingTimer;

  function ts() {
    return new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
  }

  function addMessage(content, isSent, label) {
    const empty = document.getElementById('empty-state');
    if (empty) empty.remove();

    const msgs = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = 'msg-row' + (isSent ? ' sent' : '');
    row.innerHTML = `
      <div>
        <div class="msg-bubble">${content}</div>
        <div class="msg-time" style="text-align:${isSent ? 'right' : 'left'}">${label || ''} · ${ts()}</div>
      </div>`;
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function setStatus(online, text) {
    document.getElementById('status-dot').className = 'dot' + (online ? ' online' : '');
    document.getElementById('status-text').textContent = text;
  }

  function handleConnect() {
    if (socket && socket.connected) {
      socket.disconnect();
      return;
    }

    socket = io('http://localhost:5000');

    socket.on('connect', () => {
      setStatus(true, 'Connected · ' + socket.id.slice(0, 8));
      document.getElementById('conn-btn').innerHTML = '<i class="ti ti-plug-x"></i> disconnected';
      document.getElementById('conn-btn').classList.add('connected');
    });

    socket.on('disconnect', () => {
      setStatus(false, 'Disconnected ');
      document.getElementById('conn-btn').innerHTML = '<i class="ti ti-plug"></i> connected';
      document.getElementById('conn-btn').classList.remove('connected');
      document.getElementById('msg-input').disabled = true;
      document.getElementById('send-btn').disabled = true;
      joined = false;
    });

    socket.on('receive_message', (data) => {
      const senderId = document.getElementById('sender').value;
      const isSent = data.sender === senderId;
      addMessage(data.messageContent, isSent, isSent ? 'you' : 'recevier');
    });

    socket.on('chat_history', (msgs) => {
      const senderId = document.getElementById('sender').value;
      document.getElementById('messages').innerHTML = '';
      if (!msgs.length) {
        document.getElementById('messages').innerHTML =
          '<div class="empty-state"><i class="ti ti-message-off" style="font-size:28px"></i><span>No Message /span></div>';
        return;
      }
      msgs.forEach(m => addMessage(m.messageContent, m.sender === senderId, m.sender === senderId ? 'you' : 'recevier'));
    });

    socket.on('typing', () => {
      document.getElementById('typing-indicator').classList.add('visible');
    });

    socket.on('stop_typing', () => {
      document.getElementById('typing-indicator').classList.remove('visible');
    });

    socket.on('user_online', (id) => addMessage(`🟢 ${id.slice(0, 8)}... Connection`, false, 'System'));
    socket.on('user_offline', (id) => addMessage(`⚪ ${id.slice(0, 8)}... Disconnection`, false, 'System'));
  }

  function joinRoom() {
    if (!socket || !socket.connected) { alert(' First connect!'); return; }
    const s = document.getElementById('sender').value.trim();
    const r = document.getElementById('receiver').value.trim();
    if (!s || !r) { alert('Enter IDs'); return; }

    socket.emit('add_user', s);
    socket.emit('join_room', { senderId: s, receiverId: r });
    socket.emit('get_chat_history', { senderId: s, receiverId: r });

    document.getElementById('recv-avatar').textContent = r.slice(0, 2).toUpperCase();
    document.getElementById('recv-name').textContent = 'Receiver: ' + r.slice(0, 12) + '...';
    document.getElementById('msg-input').disabled = false;
    document.getElementById('send-btn').disabled = false;
    joined = true;
  }

  function sendMsg() {
    if (!joined) { alert('Firstly join'); return; }
    const input = document.getElementById('msg-input');
    const msg = input.value.trim();
    if (!msg) return;

    socket.emit('send_message', {
      sender: document.getElementById('sender').value,
      receiver: document.getElementById('receiver').value,
      messageContent: msg
    });

    input.value = '';
    clearTimeout(typingTimer);
    socket.emit('stop_typing', {
      sender: document.getElementById('sender').value,
      receiver: document.getElementById('receiver').value
    });
  }

  function handleKey(e) { if (e.key === 'Enter') sendMsg(); }

  function handleTyping() {
    if (!joined) return;
    socket.emit('typing', {
      sender: document.getElementById('sender').value,
      receiver: document.getElementById('receiver').value
    });
    clearTimeout(typingTimer);
    typingTimer = setTimeout(() => {
      socket.emit('stop_typing', {
        sender: document.getElementById('sender').value,
        receiver: document.getElementById('receiver').value
      });
    }, 1500);
  }
</script>

</body>
</html>
